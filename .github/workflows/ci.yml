name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Default suite: Redis features are dormant (no REDIS_URL), 147 tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

  # Same suite, but with a live Redis so the Redis-gated paths run too.
  test-redis:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests (Redis-enabled)
        env:
          REDIS_URL: redis://127.0.0.1:6379/15
        run: pytest -q

  # Same idea as test-redis, but with a REAL pgvector so the semantic vector
  # store's live SQL path runs end-to-end: CREATE EXTENSION vector, the
  # vp_mem_vectors DDL, upsert with an ::vector literal, and the cosine `<=>`
  # nearest-neighbour query. Uses its OWN PGVECTOR_DSN + vp_mem_vectors table and
  # never touches the primary `memory_items` store. The bare `test` job above stays
  # 147-green because the semantic layer is inert without PGVECTOR_DSN.
  test-pgvector:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run vector-store tests (pgvector-enabled)
        env:
          PGVECTOR_DSN: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          SEMANTIC_MEMORY_ENABLED: '1'
        run: python -m pytest tests/test_vector_store.py -q

  # Deterministic, lightweight offline eval; publishes the scorecard.
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run eval
        run: python eval/run_eval.py
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval/report.json
